<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>RankerZone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#020617;
      color:white;
      overflow:hidden;
    }

    .screen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b
      );
      padding:20px;
    }

    .card{
      width:420px;
      max-width:100%;
      background:rgba(15,23,42,0.96);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:35px;
      text-align:center;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
      animation:fadeIn 0.8s ease;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .logo{
      font-size:42px;
      font-weight:bold;
      margin-bottom:20px;

      background:
      linear-gradient(
        90deg,
        #38bdf8,
        #818cf8
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      opacity:0.9;
      margin-bottom:30px;
      line-height:1.8;
      font-size:16px;
    }

    a,
    button{

      width:100%;
      padding:15px;
      border:none;
      border-radius:14px;
      margin-top:18px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      display:block;
      text-align:center;

    }

    a:hover,
    button:hover{

      transform:scale(1.03);

    }

    .primary{

      background:#38bdf8;
      color:black;

    }

    .success{

      background:#22c55e;
      color:white;
      display:none;

    }

    .watermark{

      position:fixed;
      bottom:15px;
      right:15px;

      background:rgba(0,0,0,0.45);

      padding:10px 15px;

      border-radius:12px;

      backdrop-filter:blur(6px);

      font-size:14px;

    }

  </style>

</head>
<script src="https://quge5.com/88/tag.min.js" data-zone="239280" async data-cfasync="false"></script>
  <script>(function(s){s.dataset.zone='11005998',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<body>

  <div class="screen">

    <div class="card">

      <div class="logo">
        RankerZone
      </div>

      <div class="subtitle">

        🔓 Access Locked
        <br><br>

        Join our official Telegram group
        to unlock DeltaPro access.

        <br><br>

        After joining,
        click Continue.

      </div>

      <a
        href="https://t.me/+B0VhFAE78BUzYzM1"
        target="_blank"
        class="primary"
        id="joinBtn"
      >

        Join Telegram Group

      </a>

      <button
        class="success"
        id="continueBtn"
      >

        Continue to DeltaPro

      </button>

    </div>

  </div>

  <div class="watermark">

    RankerZone

  </div>

  <script>

    const joinBtn =
      document.getElementById(
        "joinBtn"
      );

    const continueBtn =
      document.getElementById(
        "continueBtn"
      );

    // SHOW CONTINUE BUTTON

    joinBtn.addEventListener(

      "click",

      ()=>{

        setTimeout(()=>{

          continueBtn.style.display =
          "block";

        },1000);

      }

    );

    // REDIRECT

    continueBtn.addEventListener(

      "click",

      ()=>{

        window.location.href =
        "https://deltastudy.site/deltapro";

      }

    );

  </script>

</body>
</html>
