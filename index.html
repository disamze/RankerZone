<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RankerZone</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      overflow:hidden;
      background:#0f172a;
    }

    .ad-page{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
      z-index:1000;
    }

    .card{
      width:380px;
      background:rgba(15,23,42,0.95);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:35px;
      text-align:center;
      color:white;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      background:linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:10px;
    }

    .subtitle{
      opacity:0.8;
      margin-bottom:25px;
      font-size:15px;
    }

    .tg-box{
      background:#111827;
      border-radius:18px;
      padding:20px;
      margin-bottom:25px;
    }

    .tg-box h2{
      margin-bottom:10px;
      color:#38bdf8;
    }

    .tg-box p{
      font-size:14px;
      opacity:0.8;
      margin-bottom:18px;
      line-height:1.5;
    }

    .join-btn{
      display:inline-block;
      text-decoration:none;
      background:#38bdf8;
      color:black;
      font-weight:bold;
      padding:14px 28px;
      border-radius:12px;
      transition:0.3s;
    }

    .join-btn:hover{
      transform:scale(1.05);
    }

    .continue-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      display:none;
      margin-top:10px;
    }

    iframe{
      width:100%;
      height:100vh;
      border:none;
      display:none;
    }

    .watermark{
      position:fixed;
      bottom:15px;
      right:15px;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:8px 14px;
      border-radius:10px;
      z-index:9999;
      font-size:14px;
      backdrop-filter:blur(5px);
    }
  </style>
</head>
<body>

  <div class="ad-page" id="adPage">
    <div class="card">

      <div class="logo">RankerZone</div>

      <div class="subtitle">
        Premium Study Content & Lectures
      </div>

      <div class="tg-box">
        <h2>Join Official Telegram</h2>

        <p>
  🔓 Access Locked

  <br><br>

  Step 1: Click on <b>Join Telegram</b><br>
  Step 2: Join the official RankerZone Telegram channel<br>
  Step 3: Return back to this page<br>
  Step 4: Click Continue to access content
</p>

        <a
          href="https://t.me/+B0VhFAE78BUzYzM1"
          target="_blank"
          class="join-btn"
          id="joinBtn">
          Join Telegram
        </a>
      </div>

      <button class="continue-btn" id="continueBtn">
        Continue to RankerZone
      </button>

    </div>
  </div>

  <iframe
    id="siteFrame"
    src="https://eduvibe-nt.pages.dev/">
  </iframe>

  <div class="watermark">
    RankerZone
  </div>

  <script>
    const joinBtn = document.getElementById("joinBtn");
    const continueBtn = document.getElementById("continueBtn");

    joinBtn.addEventListener("click", () => {

      setTimeout(() => {
        continueBtn.style.display = "block";
      }, 1000);

    });

    continueBtn.addEventListener("click", () => {

      document.getElementById("adPage").style.display = "none";

      document.getElementById("siteFrame").style.display = "block";

    });
  </script>

</body>
</html>
