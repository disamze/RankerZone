<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RankerZone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#020617;
      overflow:hidden;
      color:white;
    }

    iframe{
      width:100%;
      height:100vh;
      border:none;
      display:none;
    }

    .screen{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
      z-index:999;
      padding:20px;
    }

    .card{
      width:420px;
      max-width:100%;
      background:rgba(15,23,42,0.96);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:35px;
      text-align:center;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
      animation:fadeIn 0.8s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      margin-bottom:15px;
      background:linear-gradient(90deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      opacity:0.85;
      margin-bottom:25px;
      line-height:1.6;
      font-size:15px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      margin-top:10px;
      background:#111827;
      color:white;
      font-size:15px;
    }

    button,a{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      margin-top:18px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      text-decoration:none;
      display:block;
      text-align:center;
    }

    button:hover,a:hover{
      transform:scale(1.03);
    }

    .primary{
      background:#38bdf8;
      color:black;
    }

    .success{
      background:#22c55e;
      color:white;
      display:none;
    }

    .leaderboard{
      margin-top:25px;
      text-align:left;
      background:#111827;
      border-radius:15px;
      padding:15px;
      max-height:260px;
      overflow:auto;
    }

    .leaderboard h3{
      text-align:center;
      margin-bottom:15px;
      color:#38bdf8;
    }

    .leader-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:8px 0;
      padding:12px;
      background:#1e293b;
      border-radius:10px;
      font-size:14px;
    }

    .rank{
      color:#38bdf8;
      font-weight:bold;
    }

    .watermark{
      position:fixed;
      bottom:15px;
      right:15px;
      background:rgba(0,0,0,0.5);
      padding:10px 15px;
      border-radius:12px;
      z-index:9999;
      backdrop-filter:blur(6px);
      font-size:14px;
    }

  </style>
</head>
<body>

  <!-- NAME SCREEN -->

  <div class="screen" id="nameScreen">

    <div class="card">

      <div class="logo">RankerZone</div>

      <div class="subtitle">
        Welcome to RankerZone.<br><br>
        Enter your name to continue.
      </div>

      <input
        type="text"
        id="username"
        placeholder="Enter your name">

      <button class="primary" id="saveName">
        Continue
      </button>

    </div>

  </div>

  <!-- TELEGRAM SCREEN -->

  <div class="screen" id="telegramScreen" style="display:none;">

    <div class="card">

      <div class="logo">RankerZone</div>

      <div class="subtitle">

        🔓 Access Locked<br><br>

        Step 1: Join official Telegram group<br>
        Step 2: Return back to this page<br>
        Step 3: Click Continue to access RankerZone

      </div>

      <a
        href="https://t.me/+B0VhFAE78BUzYzM1"
        target="_blank"
        class="primary"
        id="joinBtn">

        Join Telegram

      </a>

      <button class="success" id="continueBtn">

        Continue to RankerZone

      </button>

      <!-- LEADERBOARD -->

      <div class="leaderboard">

        <h3>🏆 Global Watch Time Leaderboard</h3>

        <div id="leaderboardList"></div>

      </div>

    </div>

  </div>

  <!-- IFRAME -->

  <iframe
    id="mainFrame"
    src="https://deltastudy.com/deltapro">
  </iframe>

  <div class="watermark">

    RankerZone

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import { getAnalytics }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

    import {

      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      onSnapshot

    }

    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyDmQiV3_6CdKZ48M18_15wEcAr0g_3iBrI",

      authDomain: "rankerzone-92cfe.firebaseapp.com",

      projectId: "rankerzone-92cfe",

      storageBucket: "rankerzone-92cfe.firebasestorage.app",

      messagingSenderId: "494298642095",

      appId: "1:494298642095:web:3d7a0ae53ff4b60610c65a",

      measurementId: "G-1Z5KMJHNN4"

    };

    // INIT

    const app = initializeApp(firebaseConfig);

    const analytics = getAnalytics(app);

    const db = getFirestore(app);

    // ELEMENTS

    const nameScreen =
      document.getElementById("nameScreen");

    const telegramScreen =
      document.getElementById("telegramScreen");

    const mainFrame =
      document.getElementById("mainFrame");

    const saveNameBtn =
      document.getElementById("saveName");

    const continueBtn =
      document.getElementById("continueBtn");

    const joinBtn =
      document.getElementById("joinBtn");

    // CHECK USER

    const savedName =
      localStorage.getItem("rankerzone_name");

    const unlocked =
      localStorage.getItem("rankerzone_access");

    // SECOND VISIT

    if(savedName){

      if(unlocked === "true"){

        nameScreen.style.display = "none";

        telegramScreen.style.display = "none";

        mainFrame.style.display = "block";

        startTracking();

      }else{

        nameScreen.style.display = "none";

        telegramScreen.style.display = "flex";

      }

    }

    // SAVE NAME

    saveNameBtn.addEventListener("click", async()=>{

      const username =
        document.getElementById("username")
        .value
        .trim();

      if(username.length < 2){

        alert("Please enter a valid name");

        return;

      }

      localStorage.setItem(
        "rankerzone_name",
        username
      );

      localStorage.setItem(
        "rankerzone_watchtime",
        "0"
      );

      // CREATE USER

      await setDoc(

        doc(db,"students",username),

        {

          name:username,

          watchTime:0

        },

        { merge:true }

      );

      nameScreen.style.display = "none";

      telegramScreen.style.display = "flex";

    });

    // JOIN TG

    joinBtn.addEventListener("click",()=>{

      setTimeout(()=>{

        continueBtn.style.display = "block";

      },1000);

    });

    // CONTINUE

    continueBtn.addEventListener("click",()=>{

      localStorage.setItem(
        "rankerzone_access",
        "true"
      );

      telegramScreen.style.display = "none";

      mainFrame.style.display = "block";

      startTracking();

    });

    // TRACK WATCHTIME

    function startTracking(){

      setInterval(async()=>{

        let currentTime =
          parseInt(

            localStorage.getItem(
              "rankerzone_watchtime"
            ) || 0

          );

        currentTime++;

        localStorage.setItem(
          "rankerzone_watchtime",
          currentTime
        );

        const username =
          localStorage.getItem(
            "rankerzone_name"
          );

        await setDoc(

          doc(db,"students",username),

          {

            name:username,

            watchTime:currentTime

          },

          { merge:true }

        );

      },1000);

    }

    // REALTIME LEADERBOARD

    onSnapshot(

      collection(db,"students"),

      (snapshot)=>{

        let users = [];

        snapshot.forEach((docu)=>{

          users.push(docu.data());

        });

        users.sort(
          (a,b)=>b.watchTime-a.watchTime
        );

        const board =
          document.getElementById(
            "leaderboardList"
          );

        board.innerHTML = "";

        users.forEach((user,index)=>{

          const item =
            document.createElement("div");

          item.className = "leader-item";

          item.innerHTML = `

            <div>

              <div class="rank">

                #${index+1} ${user.name}

              </div>

            </div>

            <div>

              ${formatTime(user.watchTime)}

            </div>

          `;

          board.appendChild(item);

        });

      }

    );

    // FORMAT TIME

    function formatTime(seconds){

      const hrs =
        Math.floor(seconds / 3600);

      const mins =
        Math.floor((seconds % 3600) / 60);

      const secs =
        seconds % 60;

      return `${hrs}h ${mins}m ${secs}s`;

    }

  </script>

</body>
</html>
